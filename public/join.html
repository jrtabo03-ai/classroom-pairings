    <script>
        const socket = io();
        function submitName() {
            const name = document.getElementById('studentName').value.trim();
            const active = document.getElementById('participation').value;
            
            if (name) {
                socket.emit('studentJoin', { name, active });
                
                document.getElementById('formContainer').innerHTML = `
                <h2>🎉 Registered!</h2>
                <p>Your details have been saved.</p>
                <br>
                <a href="/seating.html" style="display: block; padding: 12px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
                    👀 View Seating Chart

                `;
