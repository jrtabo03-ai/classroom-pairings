<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Seating Chart</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin: 20px; background: #f4f6f9; }
        .controls { margin-bottom: 20px; }
        button.flip { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #6f42c1; color: white; }
        
        .front-indicator {
            text-align: center;
            background: #e1e4e8;
            padding: 10px;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #555;
            transition: all 0.3s ease;
        }
        .front-indicator.flipped { background: #343a40; color: #fff; }

        .seating-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }
        .desk-pair { 
            background: white; 
            border: 2px solid #e1e4e8; 
            border-radius: 8px; 
            padding: 15px; 
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            min-height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .desk-pair h4 { margin: 0 0 8px 0; color: #888; font-size: 11px; text-transform: uppercase; }
        .student-name { font-weight: bold; font-size: 16px; color: #333; margin: 2px 0; }
        .passive-pair { border-color: #ff9800 !important; background: #fffde7; }
    </style>
</head>
<body>

    <h1>Current Seating Arrangement</h1>
    
    <div class="controls">
        <button class="flip" onclick="toggleFlip()">🔄 Flip View Perspective</button>
    </div>

    <div class="front-indicator" id="frontIndicator">🎬 FRONT OF ROOM / BOARD 🎬</div>

    <div class="seating-grid" id="seatingGrid"></div>

    <script>
        const socket = io();
        let savedPairsData = new Array(36).fill(null);
        let isFlipped = false; 

        socket.on('updatePairs', (pairs) => {
            savedPairsData = pairs;
            renderGrid();
        });

        function renderGrid() {
            const grid = document.getElementById('seatingGrid');
            const indicator = document.getElementById('frontIndicator');
            grid.innerHTML = ''; 

            if (isFlipped) {
                indicator.innerText = "⬇️ FRONT OF ROOM / BOARD IS AT THE BOTTOM ⬇️";
                indicator.className = "front-indicator flipped";
            } else {
                indicator.innerText = "🎬 FRONT OF ROOM / BOARD IS AT THE TOP 🎬";
                indicator.className = "front-indicator";
            }

            for (let i = 0; i < 36; i++) {
                let index = isFlipped ? (35 - i) : i;

                const desk = document.createElement('div');
                desk.className = 'desk-pair';
                
                const rowNum = Math.floor(index / 3) + 1;
                const colNum = (index % 3) + 1;
                
                let content = `<h4>Row ${rowNum} - Column ${colNum}</h4>`;
                
                if (savedPairsData[index]) {
                    content += `<div class="student-name">${savedPairsData[index][0]}</div>`;
                    content += `<div class="student-name">${savedPairsData[index][1]}</div>`;
                    
                    if (savedPairsData[index][0].includes('(Passive)') || savedPairsData[index][1].includes('(Passive)')) {
                        desk.className += ' passive-pair';
                    } else {
                        desk.style.borderColor = '#0070f3';
                    }
                } else {
                    content += `<div style="color: #ccc; font-style: italic; font-size: 13px;">Empty Desk</div>`;
                    desk.style.opacity = '0.5';
                }
                
                desk.innerHTML = content;
                grid.appendChild(desk);
            }
        }

        function toggleFlip() {
            isFlipped = !isFlipped;
            renderGrid();
        }
    </script>
</body>
</html>
